<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-width=1.0">
    <title>Digital Storytelling Flipbook</title>
    <!-- DearFlip CSS -->
    <link href="https://cdn.jsdelivr.net/npm/dearflip-webgl@1.7.3/css/dflip.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/dearflip-webgl@1.7.3/css/themify-icons.min.css" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; background-color: #2c3e50; height: 100vh; display: flex; justify-content: center; align-items: center; }
        #flipbook-container { width: 100vw; height: 100vh; }
    </style>
</head>
<body>

    <div id="flipbook-container"></div>

    <!-- jQuery & DearFlip JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dearflip-webgl@1.7.3/js/dflip.min.js"></script>

    <script>
        // Mengambil link PDF dari parameter URL ?file=
        const urlParams = new URLSearchParams(window.location.search);
        // Fallback ke PDF default jika parameter kosong untuk testing
        const pdfUrl = urlParams.get('file') || 'https://raw.githubusercontent.com/mozilla/pdf.js/ba2edeae/web/compressed.tracemonkey-pldi-09.pdf';

        $(document).ready(function () {
            // Inisialisasi Flipbook
            var flipBook = $("#flipbook-container").flipBook(pdfUrl, {
                webgl: true, // Mengaktifkan efek 3D yang realistis
                height: '100%',
                direction: 1 // 1 untuk kiri ke kanan (standar), 2 untuk kanan ke kiri (Arab/Manga)
            });
        });
    </script>
</body>
</html>
