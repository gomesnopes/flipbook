<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlipStory - Digital Library</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <!-- PENGATUR LALU LINTAS SCRIPT -->
    <script>
        var dFlipLocation = "https://cdn.jsdelivr.net/npm/@dearhive/dearflip-jquery-flipbook@1.7.3/dflip/";
        const urlParams = new URLSearchParams(window.location.search);
        const bookUrl = urlParams.get('baca');
        
        if(bookUrl) {
            var option_flipbook_container = { source: bookUrl, webgl: false, height: '100vh', direction: 1 };
        } else {
            document.write('<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"><\/script>');
            document.write('<script>if(typeof pdfjsLib !== "undefined") { pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js"; }<\/script>');
        }
    </script>
    
    <link href="https://cdn.jsdelivr.net/npm/@dearhive/dearflip-jquery-flipbook@1.7.3/dflip/css/dflip.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@dearhive/dearflip-jquery-flipbook@1.7.3/dflip/css/themify-icons.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@dearhive/dearflip-jquery-flipbook@1.7.3/dflip/js/dflip.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>

    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .modal-enter { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        #viewer-section { display: none; width: 100vw; height: 100vh; background: #1e293b; position: fixed; top: 0; left: 0; z-index: 50; }
        ._df_book { height: 100vh !important; margin: 0 !important; }
        .auth-tab-active { border-bottom: 2px solid #2563eb; color: #2563eb; font-weight: bold; }
        .auth-tab-inactive { color: #64748b; font-weight: medium; border-bottom: 2px solid transparent; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased">

    <!-- UI GALERI UTAMA -->
    <div id="main-ui">
        <nav class="bg-white shadow-sm border-b border-slate-200 px-6 py-4 flex justify-between items-center sticky top-0 z-40">
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-book-open-reader text-blue-600 text-2xl"></i>
                <h1 class="text-xl font-bold text-slate-800">FlipStory <span class="text-blue-600">Pro</span></h1>
            </div>
            
            <!-- Tempat Tombol Dinamis (Login / Profil) -->
            <div id="user-menu-container">
                <button onclick="bukaModalAuth()" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-lg font-medium transition flex items-center gap-2 shadow-sm">
                    <i class="fa-solid fa-right-to-bracket"></i> Login / Daftar
                </button>
            </div>
        </nav>

        <div class="max-w-6xl mx-auto px-6 py-10">
            <h2 class="text-3xl font-extrabold mb-2">Perpustakaan Digital</h2>
            <p class="text-slate-500 mb-8">Pilih modul, kerjakan kuisnya, dan kumpulkan poin XP sebanyak-banyaknya!</p>
            <div id="bookList" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                <p class="text-slate-500 font-medium col-span-full">Memuat modul...</p>
            </div>
        </div>
    </div>

    <!-- MODAL AUTENTIKASI (LOGIN & DAFTAR) -->
    <div id="authModal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 overflow-y-auto">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md modal-enter relative my-8">
            <button onclick="tutupModalAuth()" class="absolute top-4 right-4 text-slate-400 hover:text-slate-700 transition">
                <i class="fa-solid fa-xmark text-xl"></i>
            </button>
            
            <div class="p-6">
                <div class="text-center mb-6">
                    <i class="fa-solid fa-graduation-cap text-blue-600 text-4xl mb-2"></i>
                    <h3 class="text-2xl font-bold text-slate-800">Selamat Datang!</h3>
                    <p class="text-slate-500 text-sm">Masuk untuk menyimpan riwayat belajarmu.</p>
                </div>

                <!-- Tab Menu -->
                <div class="flex border-b border-slate-200 mb-6">
                    <button onclick="gantiTabAuth('login')" id="tab-login" class="flex-1 pb-3 text-center transition auth-tab-active">Masuk</button>
                    <button onclick="gantiTabAuth('daftar')" id="tab-daftar" class="flex-1 pb-3 text-center transition auth-tab-inactive">Daftar Baru</button>
                </div>

                <!-- Form Login -->
                <div id="form-login" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Email</label>
                        <input type="email" id="login-email" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-blue-500 focus:border-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
                        <input type="password" id="login-password" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-blue-500 focus:border-blue-500 outline-none">
                    </div>
                    <button onclick="prosesLogin()" id="btn-login" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 rounded-lg transition mt-2">Masuk</button>
                </div>

                <!-- Form Daftar -->
                <div id="form-daftar" class="hidden space-y-4 max-h-[60vh] overflow-y-auto pr-2">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Nama Lengkap</label>
                        <input type="text" id="reg-nama" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-blue-500 outline-none">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Jenis Kelamin</label>
                            <select id="reg-gender" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-blue-500 outline-none bg-white">
                                <option value="Laki-laki">Laki-laki</option>
                                <option value="Perempuan">Perempuan</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Kategori</label>
                            <select id="reg-kategori" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-blue-500 outline-none bg-white">
                                <option value="Pelajar">Pelajar</option>
                                <option value="Mahasiswa">Mahasiswa</option>
                                <option value="Umum">Umum</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Tanggal Lahir</label>
                        <input type="date" id="reg-tgl" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-blue-500 outline-none">
                    </div>
                    <div class="pt-2 border-t border-slate-100 mt-2">
                        <label class="block text-sm font-medium text-slate-700 mb-1">Email</label>
                        <input type="email" id="reg-email" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
                        <input type="password" id="reg-password" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-blue-500 outline-none">
                    </div>
                    <button onclick="prosesDaftar()" id="btn-daftar" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2.5 rounded-lg transition mt-2">Buat Akun Sekarang</button>
                </div>

                <div class="mt-6">
                    <div class="relative">
                        <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-slate-200"></div></div>
                        <div class="relative flex justify-center text-sm"><span class="px-2 bg-white text-slate-500">ATAU</span></div>
                    </div>
                    <button onclick="loginDenganGoogle()" class="mt-4 w-full bg-white border border-slate-300 hover:bg-slate-50 text-slate-700 font-bold py-2.5 rounded-lg transition flex items-center justify-center gap-2">
                        <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google" class="w-5 h-5"> Lanjutkan dengan Google
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- VIEWER SECTION -->
    <div id="viewer-section">
        <a href="?" class="absolute top-4 left-4 z-[60] bg-white/90 backdrop-blur hover:bg-white text-slate-800 px-4 py-2 rounded-lg font-bold shadow-lg transition flex items-center gap-2">
            <i class="fa-solid fa-arrow-left"></i> Kembali
        </a>
        <div class="_df_book" id="flipbook_container"></div>
    </div>

    <script>
        let supabaseClient; 
        let currentUser = null; // Menyimpan data user yang sedang aktif
        
        try {
            if (typeof CONFIG === 'undefined') throw new Error("config.js tidak terbaca!");
            supabaseClient = window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);

            // Cek status login saat halaman dimuat
            cekStatusLogin();

            if (bookUrl) {
                document.getElementById('main-ui').style.display = 'none';
                document.getElementById('viewer-section').style.display = 'block';
            } else {
                fetchBooks();
            }
        } catch (err) { console.error(err); }

        // --- FUNGSI UI MODAL ---
        function bukaModalAuth() { document.getElementById('authModal').classList.remove('hidden'); }
        function tutupModalAuth() { document.getElementById('authModal').classList.add('hidden'); }
        function gantiTabAuth(tab) {
            if(tab === 'login') {
                document.getElementById('form-login').classList.remove('hidden');
                document.getElementById('form-daftar').classList.add('hidden');
                document.getElementById('tab-login').className = "flex-1 pb-3 text-center transition auth-tab-active";
                document.getElementById('tab-daftar').className = "flex-1 pb-3 text-center transition auth-tab-inactive";
            } else {
                document.getElementById('form-login').classList.add('hidden');
                document.getElementById('form-daftar').classList.remove('hidden');
                document.getElementById('tab-login').className = "flex-1 pb-3 text-center transition auth-tab-inactive";
                document.getElementById('tab-daftar').className = "flex-1 pb-3 text-center transition auth-tab-active";
            }
        }

        // --- FUNGSI AUTENTIKASI ---
        async function cekStatusLogin() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                currentUser = session.user;
                // Ambil data profil dari database
                const { data: profil } = await supabaseClient.from('profiles').select('*').eq('id', currentUser.id).single();
                
                if (profil) {
                    // Jika login, ubah tombol di Navbar
                    document.getElementById('user-menu-container').innerHTML = `
                        <div class="flex items-center gap-4">
                            <div class="text-right hidden sm:block">
                                <p class="text-sm font-bold text-slate-800 leading-tight">${profil.nama_lengkap}</p>
                                <p class="text-xs font-bold text-emerald-600"><i class="fa-solid fa-star text-amber-400"></i> ${profil.total_poin} XP</p>
                            </div>
                            <div class="w-10 h-10 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center font-bold text-lg uppercase shadow-sm border border-blue-200">
                                ${profil.nama_lengkap.charAt(0)}
                            </div>
                            <button onclick="prosesLogout()" class="text-slate-400 hover:text-red-500 ml-2" title="Keluar">
                                <i class="fa-solid fa-right-from-bracket"></i>
                            </button>
                        </div>
                    `;
                }
            }
        }

        async function prosesDaftar() {
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;
            const nama = document.getElementById('reg-nama').value;
            const gender = document.getElementById('reg-gender').value;
            const kategori = document.getElementById('reg-kategori').value;
            const tglLahir = document.getElementById('reg-tgl').value;
            const btn = document.getElementById('btn-daftar');

            if(!email || !password || !nama || !tglLahir) return alert("Harap lengkapi semua data!");

            btn.disabled = true; btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Memproses...`;

            try {
                // 1. Buat akun di Supabase Auth
                const { data, error: authError } = await supabaseClient.auth.signUp({ email, password });
                if (authError) throw authError;

                // 2. Simpan data tambahan ke tabel profiles
                if (data.user) {
                    const { error: dbError } = await supabaseClient.from('profiles').insert([{
                        id: data.user.id,
                        nama_lengkap: nama,
                        jenis_kelamin: gender,
                        kategori: kategori,
                        tanggal_lahir: tglLahir
                    }]);
                    if (dbError) throw dbError;
                }

                alert("Pendaftaran berhasil! Silakan login.");
                gantiTabAuth('login');
            } catch (err) {
                alert("Gagal mendaftar: " + err.message);
            } finally {
                btn.disabled = false; btn.innerHTML = "Buat Akun Sekarang";
            }
        }

        async function prosesLogin() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const btn = document.getElementById('btn-login');

            if(!email || !password) return alert("Isi email dan password!");
            btn.disabled = true; btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Masuk...`;

            try {
                const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
                if (error) throw error;
                tutupModalAuth();
                window.location.reload(); // Refresh agar navbar terupdate
            } catch (err) {
                alert("Login gagal: Pastikan email dan password benar.");
            } finally {
                btn.disabled = false; btn.innerHTML = "Masuk";
            }
        }

        async function loginDenganGoogle() {
            try {
                const { error } = await supabaseClient.auth.signInWithOAuth({ provider: 'google' });
                if (error) throw error;
            } catch (err) {
                alert("Fitur Google Login belum dikonfigurasi di Supabase Anda.");
            }
        }

        async function prosesLogout() {
            await supabaseClient.auth.signOut();
            window.location.reload();
        }

        // --- FUNGSI MENGAMBIL DAFTAR BUKU ---
        function preloadPDF(url) {
            if (!document.querySelector(`link[href="${url}"]`)) {
                const prefetchLink = document.createElement('link');
                prefetchLink.rel = 'prefetch'; prefetchLink.as = 'fetch'; prefetchLink.href = url;
                document.head.appendChild(prefetchLink);
            }
        }

        async function fetchBooks() {
            try {
                const { data, error } = await supabaseClient.from('buku').select('*').order('created_at', { ascending: false });
                const bookList = document.getElementById('bookList');
                bookList.innerHTML = ''; 
                if (error) throw error;
                if (data.length === 0) return bookList.innerHTML = `<p class="col-span-full text-center">Belum ada modul di perpustakaan.</p>`;

                data.forEach(book => {
                    const shareLink = window.location.href.split('?')[0] + '?baca=' + encodeURIComponent(book.file_url);
                    const coverElement = book.cover_url ? `<img src="${book.cover_url}" alt="${book.judul}" class="w-full h-full object-cover">` : `<i class="fa-regular fa-file-pdf text-5xl"></i>`;
                    
                    bookList.innerHTML += `
                        <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden flex flex-col h-full hover:shadow-md transition" onmouseenter="preloadPDF('${book.file_url}')">
                            <div class="bg-slate-200 h-56 flex items-center justify-center relative">
                                ${coverElement}
                                <span class="absolute top-3 right-3 bg-white/90 px-2 py-1 rounded text-xs font-bold shadow-sm">${book.kategori}</span>
                            </div>
                            <div class="p-4 flex flex-col flex-grow">
                                <h3 class="font-bold text-md mb-4 flex-grow line-clamp-2">${book.judul}</h3>
                                <a href="?baca=${encodeURIComponent(book.file_url)}" class="bg-blue-600 hover:bg-blue-700 text-white text-center py-2 rounded-lg text-sm font-medium transition w-full">
                                    <i class="fa-solid fa-book-open mr-1"></i> Mulai Membaca
                                </a>
                            </div>
                        </div>
                    `;
                });
            } catch (err) { console.error(err); }
        }
    </script>
</body>
</html>
