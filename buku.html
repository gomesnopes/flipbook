<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruang Belajar - SIRASA</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>

    <style>
        .glass-nav { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        /* Kustomisasi Radio Button Kuis */
        .kuis-radio:checked + div { border-color: #4f46e5; background-color: #eef2ff; }
        .kuis-radio:checked + div .radio-dot { background-color: #4f46e5; border-color: #4f46e5; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased min-h-screen flex flex-col">

    <!-- NAVBAR -->
    <nav class="glass-nav shadow-sm border-b border-slate-200 px-4 md:px-8 py-3 flex justify-between items-center sticky top-0 z-40">
        <div class="flex items-center gap-6">
            <a href="dashboard.html" class="flex items-center gap-3 cursor-pointer group">
                <div class="w-10 h-10 bg-slate-100 text-slate-600 rounded-xl flex items-center justify-center text-xl shadow-sm group-hover:bg-rose-600 group-hover:text-white transition"><i class="fa-solid fa-arrow-left"></i></div>
                <h1 class="text-xl font-black text-slate-800 hidden md:block">Kembali ke Galeri</h1>
            </a>
        </div>
        <div class="flex items-center gap-3">
            <div class="bg-indigo-50 border border-indigo-100 px-4 py-1.5 rounded-full text-indigo-700 font-bold text-sm shadow-sm flex items-center gap-2">
                <i class="fa-solid fa-user-astronaut"></i> <span id="nav-nama-user">Memuat...</span>
            </div>
        </div>
    </nav>

    <!-- HEADER KONTEN -->
    <header class="bg-white border-b border-slate-200 py-6 px-4 md:px-8">
        <div class="max-w-[1200px] mx-auto flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div>
                <span id="badge-kategori" class="bg-rose-100 text-rose-700 text-[10px] font-black uppercase tracking-widest px-3 py-1 rounded-full mb-2 inline-block">Memuat...</span>
                <h2 id="judul-buku" class="text-2xl md:text-3xl font-black text-slate-800 tracking-tight">Memuat Judul Konten...</h2>
                <p id="desc-buku" class="text-slate-500 text-sm mt-2 max-w-2xl leading-relaxed">...</p>
            </div>
            <div id="info-kuis" class="hidden text-right shrink-0 bg-slate-50 border border-slate-200 p-3 rounded-xl shadow-sm">
                <p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">Total Pertanyaan</p>
                <p class="text-xl font-black text-indigo-600"><span id="total-soal">0</span> Soal</p>
            </div>
        </div>
    </header>

    <!-- AREA UTAMA BELAJAR & KUIS -->
    <main class="flex-1 w-full max-w-[1200px] mx-auto px-4 md:px-8 py-8 flex flex-col lg:flex-row gap-8">
        
        <!-- KOLOM KIRI: AREA MEMBACA PDF (Disembunyikan jika Evaluasi Global/Hanya Kuis) -->
        <div id="area-pdf" class="flex-1 w-full lg:w-7/12 bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden hidden flex-col h-[700px]">
            <div class="bg-slate-800 text-white px-5 py-3 border-b flex justify-between items-center shrink-0">
                <h4 class="font-bold text-sm"><i class="fa-solid fa-book-open-reader mr-2"></i> Media Pembelajaran</h4>
                <a id="btn-download-pdf" href="#" target="_blank" class="text-xs bg-slate-700 hover:bg-slate-600 px-3 py-1.5 rounded transition"><i class="fa-solid fa-download mr-1"></i> Unduh Modul</a>
            </div>
            <div class="flex-1 w-full bg-slate-100 relative">
                <iframe id="frame-pdf" src="" class="w-full h-full border-0"></iframe>
            </div>
        </div>

        <!-- KOLOM KANAN: AREA KUESIONER -->
        <div id="area-kuis" class="flex-1 w-full lg:w-5/12 hidden flex-col">
            <div class="bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden flex flex-col h-full">
                <div class="bg-indigo-600 text-white px-6 py-4 border-b flex justify-between items-center shrink-0 shadow-sm relative z-10">
                    <h4 class="font-bold"><i class="fa-solid fa-clipboard-question mr-2"></i> Lembar Kuesioner</h4>
                </div>
                
                <div class="p-6 bg-slate-50/50 flex-1 overflow-y-auto">
                    <!-- Form Kuis akan dirender di sini -->
                    <form id="form-lembar-kuis" class="space-y-8" onsubmit="event.preventDefault(); prosesKirimKuis();">
                        <div id="wadah-pertanyaan" class="space-y-6">
                            <div class="text-center py-10 text-slate-400"><i class="fa-solid fa-spinner fa-spin text-3xl mb-3"></i><p>Menyiapkan instrumen...</p></div>
                        </div>
                        
                        <div id="wadah-tombol-kirim" class="hidden pt-6 border-t border-slate-200 mt-6">
                            <button type="submit" id="btn-kirim" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-black py-4 rounded-xl shadow-lg shadow-emerald-600/30 transition-all text-lg flex items-center justify-center gap-2">
                                <i class="fa-solid fa-paper-plane"></i> Kirim Jawaban Sekarang
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
        
    </main>

    <script>
       let supabaseClient;
        let loggedInUser = null;
        let dataBuku = null;
        let bookId = null;
        
        let kuisSudahDipicu = false;
        let waktuMulaiMembaca = Date.now(); 
        
        let currentQuizData = [];
        let dimGroups = {}; // Wadah Pengelompokan Dimensi Evaluasi Global
        let sudahPernahSelesai = false;
        
        // State CAT System (Hanya untuk Kuis Latihan Modul)
        let indexSoalSaatIni = 0;
        let jawabanPeserta = []; 

        try {
            if (typeof CONFIG === 'undefined') throw new Error("config.js tidak terbaca!");
            supabaseClient = window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
            inisialisasiHalaman();
        } catch (err) { console.error(err); }

        async function inisialisasiHalaman() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) { window.location.href = 'dashboard.html'; return; }
            loggedInUser = session.user;

            const urlParams = new URLSearchParams(window.location.search);
            bookId = urlParams.get('id');
            const fileUrl = urlParams.get('file');

            if (!bookId) return keluarKeBeranda();

            // 1. Ambil Metadata Konten untuk mengecek Tipe Konten
            const { data: bukuInfo, error } = await supabaseClient.from('buku').select('*').eq('id', bookId).single();
            if (error || !bukuInfo) return keluarKeBeranda();
            dataBuku = bukuInfo;

            // 2. Tentukan Alur (Pre-Test vs Modul)
            if (dataBuku.tipe_konten === 'Hanya Kuis' || dataBuku.tipe_konten === 'Evaluasi Global') {
                document.getElementById('wadah-pretest').classList.remove('hidden');
                document.getElementById('wadah-pretest').classList.add('flex');
                document.getElementById('judul-pretest').innerText = dataBuku.judul;
                document.getElementById('deskripsi-pretest').innerText = dataBuku.deskripsi || "Silakan selesaikan kuesioner ini dengan jujur.";
                document.getElementById('label-jenis-tes').innerText = "Instrumen " + dataBuku.judul;
            } else {
                // Alur Modul PDF Biasa
                document.getElementById('wadah-buku').classList.remove('hidden');
                document.getElementById('label-jenis-tes').innerText = "Post-Test: " + dataBuku.judul;
                
                const pdfBersih = decodeURIComponent(fileUrl);
                document.getElementById('wadah-buku').innerHTML = `<div class="_df_book" source="${pdfBersih}"></div>`;

                window.DFLIP.defaults.onFlip = function(flipbook) {
                    let halamanSaatIni = flipbook.target._activePage || flipbook.target.page;
                    let totalHalaman = flipbook.target.pageCount || flipbook.options.pageCount;
                    let tombolSelesai = document.getElementById('btn-selesai');

                    if (halamanSaatIni && totalHalaman && halamanSaatIni >= totalHalaman) {
                        tombolSelesai.classList.remove('hidden'); tombolSelesai.classList.add('flex');
                        if (!kuisSudahDipicu) { kuisSudahDipicu = true; setTimeout(() => { tampilkanKonfirmasiSelesai(); }, 800); }
                    } else {
                        tombolSelesai.classList.add('hidden'); tombolSelesai.classList.remove('flex'); kuisSudahDipicu = false; 
                    }
                };
                if(window.DFLIP && window.DFLIP.parseBooks) window.DFLIP.parseBooks();
            }
        }

        function keluarKeBeranda() { window.location.href = 'dashboard.html'; }
        function tampilkanKonfirmasiSelesai() { document.getElementById('modalSelesai').classList.remove('hidden'); }
        function tutupModalSelesai() { document.getElementById('modalSelesai').classList.add('hidden'); kuisSudahDipicu = false; }

        function lanjutKuis() {
            tutupModalSelesai(); 
            document.getElementById('modalQuiz').classList.remove('hidden'); 
            indexSoalSaatIni = 0; jawabanPeserta = [];
            document.getElementById('progress-bar').style.width = '0%';
            tarikDataKuis(); 
        }

        function tutupQuiz() {
            if(confirm("Yakin ingin menutup tes? Progres akan hilang.")) {
                document.getElementById('modalQuiz').classList.add('hidden');
                document.getElementById('quiz-content').innerHTML = `<div class="text-center py-10"><i class="fa-solid fa-circle-notch fa-spin text-4xl text-rose-500 mb-4"></i><p class="text-slate-500">Memuat instrumen...</p></div>`;
                document.getElementById('quiz-footer').classList.add('hidden');
            }
        }

        // ==========================================
        // SISTEM TARIK DATA KUIS
        // ==========================================
        async function tarikDataKuis() {
            try {
                // 1. Cek Riwayat agar tidak bisa spam XP
                const { data: riwayat } = await supabaseClient.from('riwayat_kuis').select('id').eq('id_user', loggedInUser.id).eq('id_buku', bookId).limit(1).maybeSingle();
                if (riwayat) {
                    sudahPernahSelesai = true;
                    document.getElementById('info-latihan').classList.remove('hidden'); document.getElementById('info-latihan').classList.add('flex');
                }

                // 2. Tarik Soal Berdasarkan Tipe
                let query = supabaseClient.from('kuis').select('*, buku!inner(is_active, tipe_konten)');
                if (dataBuku.tipe_konten === 'Evaluasi Global') {
                    // Evaluasi Global: Tarik semua soal dari modul yg aktif (kecuali evaluasi global lainnya)
                    query = query.neq('buku.tipe_konten', 'Evaluasi Global').eq('buku.is_active', true);
                } else {
                    query = query.eq('id_buku', bookId).order('created_at', { ascending: true });
                }

                const { data, error } = await query;
                
                if (error || !data || data.length === 0) {
                    document.getElementById('quiz-header').classList.add('hidden');
                    document.getElementById('quiz-content').innerHTML = `
                        <div class="text-center py-12"><i class="fa-solid fa-face-smile text-6xl text-slate-300 mb-6"></i>
                        <h4 class="text-xl font-bold text-slate-700">Tidak Ada Kuesioner</h4><p class="text-slate-500 mt-2">Belum ada evaluasi yang disiapkan untuk konten ini.</p>
                        <button onclick="keluarKeBeranda()" class="mt-8 bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold py-3 px-8 rounded-xl transition">Kembali ke Galeri</button></div>`;
                    return;
                }

                currentQuizData = data;
                document.getElementById('quiz-header').classList.remove('hidden');
                document.getElementById('quiz-footer').classList.remove('hidden');
                
                // 3. Tentukan Metode Render: SATUAN (Modul Biasa) atau GABUNGAN (Evaluasi Global)
                if (dataBuku.tipe_konten === 'Evaluasi Global') {
                    renderSoalGabunganGlobal();
                } else {
                    renderSoalCAT(); // Sistem soal muncul 1-per-1 bawaan Anda
                }

            } catch (err) { console.error(err); }
        }

        // ==========================================
        // RENDER 1: SISTEM CAT (MUNCUL SATU-SATU UNTUK MODUL)
        // ==========================================
        function renderSoalCAT() {
            const container = document.getElementById('quiz-content');
            const soal = currentQuizData[indexSoalSaatIni];
            const progress = ((indexSoalSaatIni) / currentQuizData.length) * 100;
            document.getElementById('progress-bar').style.width = `${progress}%`;

            let htmlOpsi = '';
            if (soal.opsi_jawaban) {
                const keys = Object.keys(soal.opsi_jawaban);
                const layoutGrid = keys.length <= 2 ? 'grid-cols-2' : 'grid-cols-1 md:grid-cols-2';
                htmlOpsi = `<div class="grid ${layoutGrid} gap-3 mt-5">`;
                keys.forEach(k => {
                    const opt = soal.opsi_jawaban[k];
                    const teks = typeof opt === 'string' ? opt : opt.teks;
                    const poinVal = typeof opt === 'string' ? (k === soal.jawaban_benar ? (soal.poin_reward||1) : 0) : opt.poin;
                    htmlOpsi += `
                        <label class="radio-card flex items-center gap-3 p-4 border-2 border-slate-200 rounded-xl cursor-pointer transition bg-white">
                            <input type="radio" name="jawaban" value="${k}" data-poin="${poinVal}" class="mt-0.5 w-4 h-4 accent-rose-600 shrink-0">
                            <span class="text-slate-700 font-medium text-sm md:text-base leading-snug break-words w-full">${teks}</span>
                        </label>`;
                });
                htmlOpsi += `</div>`;
            }

            container.innerHTML = `
                <div class="modal-enter">
                    <div class="flex justify-between items-center mb-4">
                        <span class="bg-slate-100 text-slate-600 text-xs font-bold px-3 py-1.5 rounded-full uppercase tracking-wide">Pernyataan ${indexSoalSaatIni + 1} dari ${currentQuizData.length}</span>
                    </div>
                    <p class="font-bold text-slate-800 text-lg md:text-xl leading-relaxed">${soal.pertanyaan}</p>
                    ${htmlOpsi}
                </div>
            `;

            const footer = document.getElementById('quiz-footer');
            if (indexSoalSaatIni === currentQuizData.length - 1) {
                footer.innerHTML = `<button onclick="prosesKirimTerakhirCAT()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-4 rounded-xl shadow-lg transition flex items-center justify-center gap-2 text-lg"><i class="fa-solid fa-cloud-arrow-up"></i> Kirim Jawaban Akhir</button>`;
            } else {
                footer.innerHTML = `<button onclick="nextSoal()" class="w-full bg-rose-600 hover:bg-rose-700 text-white font-bold py-4 rounded-xl shadow-lg transition flex items-center justify-center gap-2 text-lg">Lanjut Soal Berikutnya <i class="fa-solid fa-arrow-right"></i></button>`;
            }
        }

        function nextSoal() {
            const terpilih = document.querySelector('input[name="jawaban"]:checked');
            if (!terpilih) return alert("Pilih salah satu tanggapan terlebih dahulu!");
            jawabanPeserta[indexSoalSaatIni] = { label: terpilih.value, poin: parseInt(terpilih.dataset.poin) || 0 };
            indexSoalSaatIni++; renderSoalCAT();
        }

        async function prosesKirimTerakhirCAT() {
            const terpilih = document.querySelector('input[name="jawaban"]:checked');
            if (!terpilih) return alert("Tentukan tanggapan untuk soal terakhir ini!");
            jawabanPeserta[indexSoalSaatIni] = { label: terpilih.value, poin: parseInt(terpilih.dataset.poin) || 0 };

            if(!confirm("Yakin ingin menyelesaikan evaluasi ini?")) return;

            const btn = document.querySelector('#quiz-footer button');
            btn.disabled = true; btn.innerHTML = "<i class='fa-solid fa-spinner fa-spin'></i> Memproses Hasil...";

            let totalPoinDapat = 0; jawabanPeserta.forEach(ans => { totalPoinDapat += ans.poin; });
            
            // Format Pengiriman ke Database (Modul Biasa: Disatukan jadi 1 baris)
            let jenisTes = dataBuku.tipe_konten === 'Hanya Kuis' ? 'Pre-Test' : 'Post-Test';
            let payloadRiwayat = [{ id_user: loggedInUser.id, id_buku: bookId, poin_didapat: totalPoinDapat, durasi_baca_detik: Math.floor((Date.now() - waktuMulaiMembaca) / 1000), jenis_tes: jenisTes }];
            
            eksekusiKirimKeDatabase(totalPoinDapat, payloadRiwayat, btn);
        }

        // ==========================================
        // RENDER 2: SISTEM EVALUASI GLOBAL (TAMPIL SEMUA DIPISAH DIMENSI)
        // ==========================================
        function renderSoalGabunganGlobal() {
            const container = document.getElementById('quiz-content');
            document.getElementById('progress-bar').style.width = '100%';
            dimGroups = {};

            // 1. Pengelompokan Berdasarkan Dimensi (dari db kuis)
            currentQuizData.forEach(q => {
                const dim = q.dimensi || 'Umum';
                if(!dimGroups[dim]) dimGroups[dim] = [];
                dimGroups[dim].push(q);
            });

            // 2. Render Form Kuesioner Panjang
            let htmlKuisLong = `<form id="form-evaluasi-global" onsubmit="event.preventDefault(); prosesKirimEvaluasiGlobal();">`;
            let nomorGlobal = 1;

            Object.keys(dimGroups).forEach((namaDimensi, idx) => {
                htmlKuisLong += `
                <div class="mb-8 border border-rose-100 bg-white rounded-2xl shadow-sm overflow-hidden">
                    <div class="bg-rose-50 px-5 py-3 border-b border-rose-100 flex items-center gap-2">
                        <i class="fa-solid fa-layer-group text-rose-500"></i>
                        <h3 class="font-black text-rose-800 uppercase tracking-wide text-sm">Bagian ${idx + 1}: ${namaDimensi}</h3>
                    </div>
                    <div class="p-5 space-y-6">
                `;

                dimGroups[namaDimensi].forEach(soal => {
                    let htmlOpsi = '';
                    if (soal.opsi_jawaban) {
                        const keys = Object.keys(soal.opsi_jawaban);
                        htmlOpsi = `<div class="grid grid-cols-1 gap-2 mt-3 pl-4">`;
                        keys.forEach(k => {
                            const opt = soal.opsi_jawaban[k];
                            const teks = typeof opt === 'string' ? opt : opt.teks;
                            const poinVal = typeof opt === 'string' ? (k === soal.jawaban_benar ? (soal.poin_reward||1) : 0) : opt.poin;
                            htmlOpsi += `
                                <label class="radio-card flex items-start gap-3 p-3 border border-slate-200 rounded-xl cursor-pointer transition">
                                    <input type="radio" name="jawaban_${soal.id}" value="${k}" data-poin="${poinVal}" class="mt-1 w-4 h-4 accent-rose-600 shrink-0" required>
                                    <span class="text-slate-700 font-medium text-sm leading-snug">${teks}</span>
                                </label>`;
                        });
                        htmlOpsi += `</div>`;
                    }
                    htmlKuisLong += `
                    <div>
                        <p class="font-bold text-slate-800 leading-relaxed"><span class="text-rose-500 mr-1">${nomorGlobal}.</span> ${soal.pertanyaan}</p>
                        ${htmlOpsi}
                    </div>`;
                    nomorGlobal++;
                });
                htmlKuisLong += `</div></div>`;
            });

            htmlKuisLong += `</form>`;
            container.innerHTML = htmlKuisLong;

            const footer = document.getElementById('quiz-footer');
            footer.innerHTML = `<button type="submit" form="form-evaluasi-global" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-4 rounded-xl shadow-lg transition flex items-center justify-center gap-2 text-lg"><i class="fa-solid fa-paper-plane"></i> Kirim Semua Jawaban Evaluasi</button>`;
        }

        async function prosesKirimEvaluasiGlobal() {
            const form = document.getElementById('form-evaluasi-global');
            if(!form.checkValidity()) { form.reportValidity(); return; }
            if(!confirm("Yakin ingin mengirim evaluasi? Periksa kembali kelengkapan jawabanmu.")) return;

            const btn = document.querySelector('#quiz-footer button');
            btn.disabled = true; btn.innerHTML = "<i class='fa-solid fa-spinner fa-spin'></i> Menghitung Nilai Per Dimensi...";

            const formData = new FormData(form);
            const labelTesInduk = dataBuku.judul.toLowerCase().includes('pre') ? 'Pre-Test' : 'Post-Test';
            
            let totalPoinDiDapat = 0;
            const payloadRiwayat = [];

            // HITUNG NILAI PER DIMENSI! (Untuk SPSS)
            Object.keys(dimGroups).forEach(namaDimensi => {
                let skorDimensi = 0;
                dimGroups[namaDimensi].forEach(q => {
                    const jwbUser = formData.get(`jawaban_${q.id}`);
                    if (q.opsi_jawaban && q.opsi_jawaban[jwbUser]) {
                        const opt = q.opsi_jawaban[jwbUser];
                        skorDimensi += (typeof opt === 'string' ? (jwbUser === q.jawaban_benar ? (q.poin_reward||1) : 0) : opt.poin);
                    }
                });

                totalPoinDiDapat += skorDimensi;
                // Pecah jadi baris terpisah berdasarkan Dimensinya (misal: "Pre-Test - Pengetahuan")
                payloadRiwayat.push({
                    id_user: loggedInUser.id,
                    id_buku: bookId, 
                    poin_didapat: skorDimensi,
                    durasi_baca_detik: Math.floor((Date.now() - waktuMulaiMembaca) / 1000),
                    jenis_tes: `${labelTesInduk} - ${namaDimensi}` 
                });
            });

            eksekusiKirimKeDatabase(totalPoinDiDapat, payloadRiwayat, btn);
        }

        // ==========================================
        // FINALISASI PENYIMPANAN & TAMPILAN SUKSES
        // ==========================================
        async function eksekusiKirimKeDatabase(totalPoinDapat, payloadRiwayat, btnDOM) {
            try {
                if (!sudahPernahSelesai) {
                    if (totalPoinDapat > 0) {
                        const { data: profil } = await supabaseClient.from('profiles').select('total_poin').eq('id', loggedInUser.id).single();
                        await supabaseClient.from('profiles').update({ total_poin: (profil.total_poin || 0) + totalPoinDapat }).eq('id', loggedInUser.id);
                    }
                    // Tembakkan payload ke database (bisa 1 baris untuk modul biasa, atau 5 baris untuk Evaluasi Global)
                    const { error } = await supabaseClient.from('riwayat_kuis').insert(payloadRiwayat);
                    if (error) throw error;
                    sudahPernahSelesai = true; 
                }

                // Tampilan Sukses
                let textReward = sudahPernahSelesai ? `<span class="text-slate-600 font-bold text-lg"><i class="fa-solid fa-check-double"></i> Data Tersimpan</span>` : `<span class="text-rose-600 font-black text-xl">+ ${totalPoinDapat} XP Didapatkan!</span>`;
                
                document.getElementById('quiz-header').classList.add('hidden');
                document.getElementById('quiz-footer').classList.add('hidden');
                document.getElementById('btn-tutup-kuis').classList.add('hidden'); 

                document.getElementById('quiz-content').innerHTML = `
                    <div class="text-center py-10 modal-enter">
                        <div class="w-24 h-24 bg-rose-100 rounded-full flex items-center justify-center mx-auto mb-6"><i class="fa-solid fa-trophy text-rose-500 text-5xl"></i></div>
                        <h3 class="text-3xl font-black text-slate-800 mb-2">Perekaman Selesai!</h3>
                        <p class="text-slate-500 mb-6 text-sm">Terima kasih atas partisipasinya dalam kuesioner ini.</p>
                        <div class="inline-block bg-rose-50 border-rose-200 border px-8 py-4 rounded-2xl mb-8 shadow-sm">${textReward}</div>
                        <div class="flex flex-col gap-3 max-w-sm mx-auto">
                            <button onclick="keluarKeBeranda()" class="w-full bg-rose-600 hover:bg-rose-700 text-white font-bold py-3.5 rounded-xl transition shadow-md">
                                <i class="fa-solid fa-house mr-2"></i> Kembali ke Galeri
                            </button>
                        </div>
                    </div>`;
            } catch(e) {
                console.error(e); alert("Terjadi kesalahan jaringan."); 
                btnDOM.disabled = false; btnDOM.innerHTML = `<i class="fa-solid fa-cloud-arrow-up"></i> Coba Kirim Ulang`; 
            }
        }
    </script>
</body>
