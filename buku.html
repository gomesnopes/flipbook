<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruang Belajar - SIRASA</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>

    <style>
        .glass-nav { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        /* Kustomisasi Radio Button Kuis */
        .kuis-radio:checked + div { border-color: #4f46e5; background-color: #eef2ff; }
        .kuis-radio:checked + div .radio-dot { background-color: #4f46e5; border-color: #4f46e5; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased min-h-screen flex flex-col">

    <!-- NAVBAR -->
    <nav class="glass-nav shadow-sm border-b border-slate-200 px-4 md:px-8 py-3 flex justify-between items-center sticky top-0 z-40">
        <div class="flex items-center gap-6">
            <a href="dashboard.html" class="flex items-center gap-3 cursor-pointer group">
                <div class="w-10 h-10 bg-slate-100 text-slate-600 rounded-xl flex items-center justify-center text-xl shadow-sm group-hover:bg-rose-600 group-hover:text-white transition"><i class="fa-solid fa-arrow-left"></i></div>
                <h1 class="text-xl font-black text-slate-800 hidden md:block">Kembali ke Galeri</h1>
            </a>
        </div>
        <div class="flex items-center gap-3">
            <div class="bg-indigo-50 border border-indigo-100 px-4 py-1.5 rounded-full text-indigo-700 font-bold text-sm shadow-sm flex items-center gap-2">
                <i class="fa-solid fa-user-astronaut"></i> <span id="nav-nama-user">Memuat...</span>
            </div>
        </div>
    </nav>

    <!-- HEADER KONTEN -->
    <header class="bg-white border-b border-slate-200 py-6 px-4 md:px-8">
        <div class="max-w-[1200px] mx-auto flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div>
                <span id="badge-kategori" class="bg-rose-100 text-rose-700 text-[10px] font-black uppercase tracking-widest px-3 py-1 rounded-full mb-2 inline-block">Memuat...</span>
                <h2 id="judul-buku" class="text-2xl md:text-3xl font-black text-slate-800 tracking-tight">Memuat Judul Konten...</h2>
                <p id="desc-buku" class="text-slate-500 text-sm mt-2 max-w-2xl leading-relaxed">...</p>
            </div>
            <div id="info-kuis" class="hidden text-right shrink-0 bg-slate-50 border border-slate-200 p-3 rounded-xl shadow-sm">
                <p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">Total Pertanyaan</p>
                <p class="text-xl font-black text-indigo-600"><span id="total-soal">0</span> Soal</p>
            </div>
        </div>
    </header>

    <!-- AREA UTAMA BELAJAR & KUIS -->
    <main class="flex-1 w-full max-w-[1200px] mx-auto px-4 md:px-8 py-8 flex flex-col lg:flex-row gap-8">
        
        <!-- KOLOM KIRI: AREA MEMBACA PDF (Disembunyikan jika Evaluasi Global/Hanya Kuis) -->
        <div id="area-pdf" class="flex-1 w-full lg:w-7/12 bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden hidden flex-col h-[700px]">
            <div class="bg-slate-800 text-white px-5 py-3 border-b flex justify-between items-center shrink-0">
                <h4 class="font-bold text-sm"><i class="fa-solid fa-book-open-reader mr-2"></i> Media Pembelajaran</h4>
                <a id="btn-download-pdf" href="#" target="_blank" class="text-xs bg-slate-700 hover:bg-slate-600 px-3 py-1.5 rounded transition"><i class="fa-solid fa-download mr-1"></i> Unduh Modul</a>
            </div>
            <div class="flex-1 w-full bg-slate-100 relative">
                <iframe id="frame-pdf" src="" class="w-full h-full border-0"></iframe>
            </div>
        </div>

        <!-- KOLOM KANAN: AREA KUESIONER -->
        <div id="area-kuis" class="flex-1 w-full lg:w-5/12 hidden flex-col">
            <div class="bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden flex flex-col h-full">
                <div class="bg-indigo-600 text-white px-6 py-4 border-b flex justify-between items-center shrink-0 shadow-sm relative z-10">
                    <h4 class="font-bold"><i class="fa-solid fa-clipboard-question mr-2"></i> Lembar Kuesioner</h4>
                </div>
                
                <div class="p-6 bg-slate-50/50 flex-1 overflow-y-auto">
                    <!-- Form Kuis akan dirender di sini -->
                    <form id="form-lembar-kuis" class="space-y-8" onsubmit="event.preventDefault(); prosesKirimKuis();">
                        <div id="wadah-pertanyaan" class="space-y-6">
                            <div class="text-center py-10 text-slate-400"><i class="fa-solid fa-spinner fa-spin text-3xl mb-3"></i><p>Menyiapkan instrumen...</p></div>
                        </div>
                        
                        <div id="wadah-tombol-kirim" class="hidden pt-6 border-t border-slate-200 mt-6">
                            <button type="submit" id="btn-kirim" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-black py-4 rounded-xl shadow-lg shadow-emerald-600/30 transition-all text-lg flex items-center justify-center gap-2">
                                <i class="fa-solid fa-paper-plane"></i> Kirim Jawaban Sekarang
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
        
    </main>

    <script>
        let supabaseClient;
        let currentUser = null;
        let metaBuku = null;
        let dataKuisAsli = [];
        let dimGroups = {}; // Wadah Pengelompokan Dimensi

        document.addEventListener('DOMContentLoaded', () => {
            if (typeof CONFIG === 'undefined') { alert("config.js tidak terbaca!"); return; }
            supabaseClient = window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
            inisialisasiHalaman();
        });

        async function inisialisasiHalaman() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) { window.location.href = 'index.html'; return; }
            
            currentUser = session.user;
            const { data: profil } = await supabaseClient.from('profiles').select('nama_lengkap').eq('id', currentUser.id).single();
            if(profil) document.getElementById('nav-nama-user').innerText = profil.nama_lengkap.split(' ')[0];

            const urlParams = new URLSearchParams(window.location.search);
            const idBuku = urlParams.get('id');
            if(!idBuku) { alert("ID Konten tidak valid!"); window.location.href = 'dashboard.html'; return; }

            await tarikDataKonten(idBuku);
        }

        async function tarikDataKonten(id) {
            try {
                // 1. Tarik Info Buku/Modul
                const { data: buku, error } = await supabaseClient.from('buku').select('*').eq('id', id).single();
                if(error || !buku) throw new Error("Data tidak ditemukan.");
                metaBuku = buku;

                document.getElementById('judul-buku').innerText = buku.judul;
                document.getElementById('desc-buku').innerText = buku.deskripsi || "Silakan baca petunjuk pengerjaan dan jawab dengan teliti.";
                
                let badge = buku.kategori;
                if(buku.tipe_konten === 'Evaluasi Global') { badge = "EVALUASI GLOBAL (GABUNGAN)"; document.getElementById('badge-kategori').className = "bg-amber-100 text-amber-700 text-[10px] font-black uppercase tracking-widest px-3 py-1 rounded-full mb-2 inline-block"; }
                else if (buku.judul.toLowerCase().includes('pre')) { badge = "PRE-TEST"; document.getElementById('badge-kategori').className = "bg-indigo-100 text-indigo-700 text-[10px] font-black uppercase tracking-widest px-3 py-1 rounded-full mb-2 inline-block"; }
                document.getElementById('badge-kategori').innerText = badge;

                // 2. Tentukan Tampilan UI
                const areaPdf = document.getElementById('area-pdf');
                const areaKuis = document.getElementById('area-kuis');

                if (buku.tipe_konten === 'Modul PDF' && buku.file_url) {
                    areaPdf.classList.remove('hidden'); areaPdf.classList.add('flex');
                    document.getElementById('frame-pdf').src = buku.file_url;
                    document.getElementById('btn-download-pdf').href = buku.file_url;
                } else {
                    // Jika Evaluasi Global / Kuis, area Kuis dibuat Full Width (Lebar penuh)
                    areaKuis.classList.remove('lg:w-5/12'); areaKuis.classList.add('w-full');
                }

                // 3. Tarik Data Kuis berdasarkan "Otak Baru"
                await tarikSoalKuis(buku);

            } catch(e) {
                alert("Gagal memuat halaman: " + e.message);
                window.location.href = 'dashboard.html';
            }
        }

        async function tarikSoalKuis(buku) {
            try {
                let query = supabaseClient.from('kuis').select('*, buku!inner(is_active, tipe_konten)');
                
                if (buku.tipe_konten === 'Evaluasi Global') {
                    // JIKA EVALUASI GLOBAL: Sedot SEMUA soal yang nempel di modul-modul aktif (Kecuali dari evaluasi global lain untuk hindari infinite loop)
                    query = query.neq('buku.tipe_konten', 'Evaluasi Global').eq('buku.is_active', true);
                } else {
                    // JIKA MODUL BIASA: Hanya sedot soal miliknya sendiri
                    query = query.eq('id_buku', buku.id);
                }

                const { data: soal, error } = await query;
                if(error) throw error;

                dataKuisAsli = soal || [];
                const wadah = document.getElementById('wadah-pertanyaan');
                
                if (dataKuisAsli.length === 0) {
                    wadah.innerHTML = `<div class="text-center py-10 bg-white rounded-2xl border"><i class="fa-solid fa-mug-hot text-4xl mb-3 text-slate-300"></i><p class="text-slate-500 font-medium">Belum ada instrumen kuesioner yang tersedia.</p></div>`;
                    document.getElementById('info-kuis').classList.add('hidden');
                    return;
                }

                document.getElementById('info-kuis').classList.remove('hidden');
                document.getElementById('total-soal').innerText = dataKuisAsli.length;
                document.getElementById('wadah-tombol-kirim').classList.remove('hidden');
                area-kuis.classList.remove('hidden'); area-kuis.classList.add('flex');

                wadah.innerHTML = '';
                dimGroups = {}; // Reset

                // MESIN PENGELOMPOKKAN SOAL (GROUP BY DIMENSI)
                if (buku.tipe_konten === 'Evaluasi Global') {
                    dataKuisAsli.forEach(q => {
                        const dim = q.dimensi || 'Umum';
                        if(!dimGroups[dim]) dimGroups[dim] = [];
                        dimGroups[dim].push(q);
                    });

                    let nomorGlobal = 1;
                    Object.keys(dimGroups).forEach((namaDimensi, idx) => {
                        // Header Dimensi
                        let htmlBagian = `
                        <div class="mb-10 bg-white p-6 rounded-2xl border border-indigo-100 shadow-sm relative overflow-hidden">
                            <div class="absolute top-0 left-0 w-2 h-full bg-indigo-500"></div>
                            <h3 class="text-lg md:text-xl font-black text-indigo-800 border-b border-indigo-100 pb-3 mb-5 flex items-center gap-2">
                                <i class="fa-solid fa-tags text-indigo-400"></i> Bagian ${idx + 1}: Dimensi ${namaDimensi}
                            </h3>
                            <div class="space-y-6">
                        `;
                        // Render Soal dalam Dimensi
                        dimGroups[namaDimensi].forEach(q => {
                            htmlBagian += renderTemplateSoal(q, nomorGlobal);
                            nomorGlobal++;
                        });
                        htmlBagian += `</div></div>`;
                        wadah.innerHTML += htmlBagian;
                    });

                } else {
                    // JIKA MODUL BIASA (TIDAK DIPISAH DIMENSI)
                    let htmlBagian = `<div class="bg-white p-5 rounded-2xl border shadow-sm space-y-6">`;
                    dataKuisAsli.forEach((q, i) => { htmlBagian += renderTemplateSoal(q, i + 1); });
                    htmlBagian += `</div>`;
                    wadah.innerHTML = htmlBagian;
                }

            } catch(e) { console.error(e); }
        }

        // FUNGSI RENDER SATUAN SOAL
        function renderTemplateSoal(q, nomor) {
            let opsiHtml = '';
            if (q.opsi_jawaban) {
                Object.keys(q.opsi_jawaban).forEach(k => {
                    const opt = q.opsi_jawaban[k]; const teks = typeof opt === 'string' ? opt : opt.teks;
                    opsiHtml += `
                    <label class="relative flex cursor-pointer">
                        <input type="radio" name="jawaban_${q.id}" value="${k}" class="kuis-radio sr-only" required>
                        <div class="w-full flex items-start gap-3 p-4 border border-slate-200 rounded-xl transition hover:bg-slate-50 bg-white">
                            <div class="radio-dot w-5 h-5 rounded-full border-2 border-slate-300 mt-0.5 shrink-0 transition flex items-center justify-center">
                                <div class="w-2.5 h-2.5 bg-white rounded-full"></div>
                            </div>
                            <span class="text-sm md:text-base font-medium text-slate-700 leading-snug">${teks}</span>
                        </div>
                    </label>
                    `;
                });
            }
            return `
            <div class="soal-item">
                <p class="font-bold text-slate-800 text-sm md:text-base mb-3 leading-relaxed">
                    <span class="text-indigo-500 mr-1">${nomor}.</span> ${q.pertanyaan}
                </p>
                <div class="space-y-2.5 pl-2 md:pl-6">${opsiHtml}</div>
            </div>`;
        }

        // FUNGSI MESIN PENILAIAN & SUBMIT SPSS
        async function prosesKirimKuis() {
            const form = document.getElementById('form-lembar-kuis');
            if(!form.checkValidity()) { form.reportValidity(); return; }
            if(!confirm("Yakin ingin mengirim jawaban? Pastikan semua soal telah terisi.")) return;

            const btn = document.getElementById('btn-kirim');
            btn.disabled = true; btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Memproses Nilai...`;

            try {
                const formData = new FormData(form);
                const isEvaluasiGlobal = metaBuku.tipe_konten === 'Evaluasi Global';
                const labelTesInduk = metaBuku.judul.toLowerCase().includes('pre') ? 'Pre-Test' : 'Post-Test'; // Penentu Pre atau Post
                
                let totalPoinDiDapat = 0; // Untuk di-update ke profile User
                const payloadRiwayat = []; // Array data yang akan ditembak ke database

                if (isEvaluasiGlobal) {
                    // HITUNG NILAI PER DIMENSI (EVALUASI GLOBAL)
                    Object.keys(dimGroups).forEach(namaDimensi => {
                        let skorDimensi = 0;
                        dimGroups[namaDimensi].forEach(q => {
                            const jwbUser = formData.get(`jawaban_${q.id}`);
                            if (q.opsi_jawaban && q.opsi_jawaban[jwbUser]) {
                                const opt = q.opsi_jawaban[jwbUser];
                                skorDimensi += (typeof opt === 'string' ? (jwbUser === q.jawaban_benar ? (q.poin_reward||1) : 0) : opt.poin);
                            }
                        });

                        totalPoinDiDapat += skorDimensi;
                        
                        // Siapkan 1 baris rekaman khusus Dimensi ini
                        // Format jenis_tes: "Pre-Test - Pengetahuan" (Sangat rapi untuk filter Admin & SPSS)
                        payloadRiwayat.push({
                            id_user: currentUser.id,
                            id_buku: metaBuku.id, // Tetap menempel ke ID Buku Evaluasi
                            poin_didapat: skorDimensi,
                            jenis_tes: `${labelTesInduk} - ${namaDimensi}` 
                        });
                    });

                } else {
                    // HITUNG NILAI GABUNGAN (MODUL BIASA)
                    let skorTunggal = 0;
                    dataKuisAsli.forEach(q => {
                        const jwbUser = formData.get(`jawaban_${q.id}`);
                        if (q.opsi_jawaban && q.opsi_jawaban[jwbUser]) {
                            const opt = q.opsi_jawaban[jwbUser];
                            skorTunggal += (typeof opt === 'string' ? (jwbUser === q.jawaban_benar ? (q.poin_reward||1) : 0) : opt.poin);
                        }
                    });

                    totalPoinDiDapat += skorTunggal;
                    payloadRiwayat.push({
                        id_user: currentUser.id,
                        id_buku: metaBuku.id,
                        poin_didapat: skorTunggal,
                        jenis_tes: 'Kuis Modul'
                    });
                }

                // 1. Simpan ke Riwayat secara Massal
                const { error: errRiwayat } = await supabaseClient.from('riwayat_kuis').insert(payloadRiwayat);
                if(errRiwayat) throw errRiwayat;

                // 2. Tambahkan Poin (XP) ke Profil User
                const { data: profilLama } = await supabaseClient.from('profiles').select('total_poin').eq('id', currentUser.id).single();
                const xpLama = profilLama ? (profilLama.total_poin || 0) : 0;
                await supabaseClient.from('profiles').update({ total_poin: xpLama + totalPoinDiDapat }).eq('id', currentUser.id);

                // 3. Sukses & Alihkan
                document.getElementById('wadah-pertanyaan').innerHTML = `
                <div class="text-center py-16 fade-in">
                    <div class="w-24 h-24 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center text-5xl mx-auto mb-6 shadow-inner"><i class="fa-solid fa-check-double"></i></div>
                    <h3 class="text-3xl font-black text-slate-800 mb-2">Luar Biasa!</h3>
                    <p class="text-slate-500 font-medium text-lg">Kamu berhasil menyelesaikan kuis dan mendapatkan <strong class="text-emerald-600">+${totalPoinDiDapat} XP</strong>.</p>
                </div>`;
                document.getElementById('wadah-tombol-kirim').classList.add('hidden');
                
                setTimeout(() => { window.location.href = 'dashboard.html'; }, 3500); // Otomatis kembali setelah 3.5 dtk

            } catch(e) {
                alert("Terjadi kesalahan sistem saat menyimpan nilai.");
                btn.disabled = false; btn.innerHTML = `<i class="fa-solid fa-paper-plane"></i> Coba Kirim Ulang`;
            }
        }
    </script>
</body>
</html>
