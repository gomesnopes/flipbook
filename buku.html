<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Membaca Modul - FlipStory Pro</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/@dearhive/dearflip-jquery-flipbook@1.7.3/dflip/css/dflip.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@dearhive/dearflip-jquery-flipbook@1.7.3/dflip/css/themify-icons.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@dearhive/dearflip-jquery-flipbook@1.7.3/dflip/js/dflip.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>

    <style>
        body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; background: #0f172a; font-family: sans-serif; }
        .modal-enter { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <div class="absolute top-4 left-4 right-4 flex justify-between z-[60] pointer-events-none">
        <button onclick="window.location.href='index.html'" class="pointer-events-auto bg-slate-800/80 backdrop-blur hover:bg-slate-700 text-white px-4 py-2 rounded-lg font-bold shadow-lg transition flex items-center gap-2 text-sm border border-slate-600">
            <i class="fa-solid fa-arrow-left"></i> Kembali
        </button>
        
        <button onclick="tampilkanKonfirmasiSelesai()" class="pointer-events-auto bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-lg font-bold shadow-lg transition flex items-center gap-2 text-sm border border-emerald-500">
            <i class="fa-solid fa-check"></i> Selesai Membaca
        </button>
    </div>

    <div id="flipbook_container" class="w-full h-full"></div>

    <div id="modalSelesai" class="hidden fixed inset-0 bg-slate-900/90 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-sm modal-enter p-8 text-center relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-emerald-400 to-blue-500"></div>
            
            <div class="w-20 h-20 bg-emerald-50 text-emerald-500 rounded-full flex items-center justify-center text-4xl mx-auto mb-5 shadow-inner">
                <i class="fa-solid fa-flag-checkered"></i>
            </div>
            
            <h3 class="text-2xl font-black text-slate-800 mb-2">Modul Selesai!</h3>
            <p class="text-slate-500 text-sm mb-8 leading-relaxed">Hebat! Kamu telah menyelesaikan materi ini. Siap untuk menguji ingatanmu dan mengklaim poin XP?</p>
            
            <div class="flex flex-col gap-3">
                <button onclick="lanjutKeKuis()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 rounded-xl shadow-md transition flex items-center justify-center gap-2">
                    <i class="fa-solid fa-gamepad"></i> Mulai Tantangan Kuis
                </button>
                <button onclick="tutupModalSelesai()" class="w-full bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold py-3.5 rounded-xl transition">
                    Kembali Membaca
                </button>
            </div>
        </div>
    </div>

    <script>
        let supabaseClient;
        let bookId = null;
        let fileUrl = null;
        let kuisSudahDipicu = false;

        try {
            supabaseClient = window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
            validasiAkses();
        } catch (err) { console.error(err); }

        async function validasiAkses() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) {
                // Jika nekat buka URL buku.html tanpa login, usir ke login
                window.location.href = 'login.html?pesan=wajib_login';
                return;
            }

            const urlParams = new URLSearchParams(window.location.search);
            bookId = urlParams.get('id');
            fileUrl = urlParams.get('file');

            if (!bookId || !fileUrl) {
                alert("Data modul tidak valid!");
                window.location.href = 'index.html';
                return;
            }

            renderBuku(decodeURIComponent(fileUrl));
        }

        function renderBuku(urlPdf) {
            // Inisialisasi Manual DearFlip
            $('#flipbook_container').flipBook(urlPdf, {
                webgl: false,
                soundEnable: true,
                height: '100vh',
                hideControls: "download,print,more,share,fullscreen,toggle,play", 
                onPageChange: function(flipbook) {
                    if (flipbook && flipbook.currentPage === flipbook.totalPages && !kuisSudahDipicu) {
                        kuisSudahDipicu = true;
                        setTimeout(() => {
                            tampilkanKonfirmasiSelesai();
                        }, 1000);
                    }
                }
            });
        }

        function tampilkanKonfirmasiSelesai() {
            document.getElementById('modalSelesai').classList.remove('hidden');
        }

        function tutupModalSelesai() {
            document.getElementById('modalSelesai').classList.add('hidden');
            kuisSudahDipicu = false; // Reset pemicu
        }

        function lanjutKeKuis() {
            // Lempar pengguna ke halaman kuis dengan membawa ID BUKU
            window.location.href = `quiz.html?buku_id=${bookId}`;
        }
    </script>
</body>
</html>
