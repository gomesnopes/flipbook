<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruang Belajar - SIRASA</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <script>
        window.DFLIP = window.DFLIP || {};
        window.DFLIP.defaults = { webgl: false, soundEnable: true, hideControls: "download,print,more,share,fullscreen,toggle,play" };
    </script>
    <link href="https://cdn.jsdelivr.net/npm/@dearhive/dearflip-jquery-flipbook@1.7.3/dflip/css/dflip.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@dearhive/dearflip-jquery-flipbook@1.7.3/dflip/css/themify-icons.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@dearhive/dearflip-jquery-flipbook@1.7.3/dflip/js/dflip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>

    <style>
        body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; background: #0f172a; }
        .modal-enter { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        ._df_book { height: 100vh !important; width: 100vw !important; margin: 0 !important; }
    </style>
</head>
<body>

    <div class="absolute top-4 left-4 right-4 flex justify-between z-[60] pointer-events-none">
        <button onclick="keluarKeBeranda()" class="pointer-events-auto bg-slate-800/80 backdrop-blur hover:bg-slate-700 text-white px-4 py-2 rounded-lg font-bold shadow-lg transition flex items-center gap-2 text-sm border border-slate-600">
            <i class="fa-solid fa-arrow-left"></i> Kembali
        </button>
        <button id="btn-selesai" onclick="tampilkanKonfirmasiSelesai()" class="hidden pointer-events-auto bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-lg font-bold shadow-lg transition items-center gap-2 text-sm border border-emerald-500">
            <i class="fa-solid fa-check-double"></i> Selesai Membaca
        </button>
    </div>

    <div id="wadah-buku" class="w-full h-full"><div class="_df_book" id="df_container" source=""></div></div>

    <div id="modalSelesai" class="hidden fixed inset-0 bg-slate-900/90 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-sm modal-enter p-8 text-center relative overflow-hidden">
            <div class="w-20 h-20 bg-emerald-50 text-emerald-500 rounded-full flex items-center justify-center text-4xl mx-auto mb-4"><i class="fa-solid fa-book-open-reader"></i></div>
            <h3 class="text-2xl font-black text-slate-800 mb-2">Modul Selesai!</h3>
            <p id="teks-selesai" class="text-slate-500 text-sm mb-6">Hebat! Kamu telah menyelesaikan materi ini.</p>
            <div class="flex flex-col gap-3">
                <button onclick="arahkanKeLanjutan()" id="btn-lanjut-kuis" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3.5 rounded-xl shadow-md transition hidden">Mulai Kuis Latihan</button>
                <button onclick="keluarKeBeranda()" class="w-full bg-rose-600 hover:bg-rose-700 text-white font-bold py-3.5 rounded-xl shadow-md transition hidden" id="btn-tutup-modul">Kembali ke Menu</button>
                <button onclick="tutupModalSelesai()" class="w-full bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold py-3.5 rounded-xl transition">Baca Ulang</button>
            </div>
        </div>
    </div>

    <script>
        let supabaseClient;
        let loggedInUser = null;
        let dataBuku = null;
        let bookId = null;
        let kuisSudahDipicu = false;
        let waktuMulaiMembaca = Date.now(); // Catat waktu mulai membaca detik ke-0

        document.addEventListener('DOMContentLoaded', async () => {
            if (typeof CONFIG === 'undefined') { alert("config.js tidak terbaca!"); return; }
            supabaseClient = window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
            
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) { window.location.href = 'dashboard.html'; return; }
            loggedInUser = session.user; // Simpan data user yang login

            const urlParams = new URLSearchParams(window.location.search);
            bookId = urlParams.get('id');
            const fileUrl = urlParams.get('file');

            if (!bookId) return keluarKeBeranda();

            // Ambil Info Modul
            const { data: bukuInfo, error } = await supabaseClient.from('buku').select('*').eq('id', bookId).single();
            if (error || !bukuInfo) return keluarKeBeranda();
            dataBuku = bukuInfo;

            // Jika yang dibuka secara tidak sengaja adalah tipe kuis, lempar ke file kuis.html
            if (dataBuku.tipe_konten === 'Hanya Kuis' || dataBuku.tipe_konten === 'Evaluasi Global') {
                window.location.href = `kuis.html?id=${bookId}`;
                return;
            }

            // Muat PDF
            const pdfBersih = decodeURIComponent(fileUrl);
            document.getElementById('df_container').setAttribute('source', pdfBersih);

            window.DFLIP.defaults.onFlip = function(flipbook) {
                let halamanSaatIni = flipbook.target._activePage || flipbook.target.page;
                let totalHalaman = flipbook.target.pageCount || flipbook.options.pageCount;
                let tombolSelesai = document.getElementById('btn-selesai');

                if (halamanSaatIni && totalHalaman && halamanSaatIni >= totalHalaman) {
                    tombolSelesai.classList.remove('hidden'); tombolSelesai.classList.add('flex');
                    if (!kuisSudahDipicu) { kuisSudahDipicu = true; setTimeout(() => { tampilkanKonfirmasiSelesai(); }, 800); }
                } else {
                    tombolSelesai.classList.add('hidden'); tombolSelesai.classList.remove('flex'); kuisSudahDipicu = false; 
                }
            };
            if(window.DFLIP && window.DFLIP.parseBooks) window.DFLIP.parseBooks();
        });

        function tampilkanKonfirmasiSelesai() { 
            document.getElementById('modalSelesai').classList.remove('hidden'); 
            
            // Cek apakah modul ini disinkronkan dengan kuis tertentu di admin
            if (dataBuku.id_kuis_terkait && dataBuku.id_kuis_terkait.trim() !== '') {
                document.getElementById('btn-lanjut-kuis').classList.remove('hidden');
                document.getElementById('teks-selesai').innerText = "Hebat! Kamu telah menyelesaikan materi ini. Mari uji pemahamanmu di Kuis Latihan!";
            } else {
                document.getElementById('btn-tutup-modul').classList.remove('hidden');
            }
        }
        
        function tutupModalSelesai() { document.getElementById('modalSelesai').classList.add('hidden'); kuisSudahDipicu = false; }

        // === FUNGSI PEREKAM WAKTU BACA ===
        async function simpanDurasiBaca() {
            try {
                let durasi = Math.floor((Date.now() - waktuMulaiMembaca) / 1000);
                // Menyimpan rekam jejak hanya durasi untuk membaca modul PDF
                await supabaseClient.from('riwayat_kuis').insert([{
                    id_user: loggedInUser.id, 
                    id_buku: bookId, 
                    poin_didapat: 0,
                    durasi_baca_detik: durasi, 
                    jenis_tes: "Membaca Modul PDF", 
                    dimensi: "Aktivitas"
                }]);
            } catch(e) { console.error("Gagal simpan waktu", e); }
        }

        async function keluarKeBeranda() { 
            document.body.style.cursor = 'wait';
            await simpanDurasiBaca(); // Rekam detik dulu sebelum pindah
            window.location.href = 'dashboard.html'; 
        }
        
        async function arahkanKeLanjutan() {
            document.getElementById('btn-lanjut-kuis').innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Memuat Ujian...';
            await simpanDurasiBaca(); // Rekam detik dulu sebelum pindah ke kuis
            window.location.href = `kuis.html?id=${dataBuku.id_kuis_terkait}`;
        }
    </script>
</body>
</html>
