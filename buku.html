<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Viewer Modul</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    
    <script>
        var dFlipLocation = "https://cdn.jsdelivr.net/npm/@dearhive/dearflip-jquery-flipbook@1.7.3/dflip/";
        const urlParams = new URLSearchParams(window.location.search);
        const fileUrl = urlParams.get('file');
        
        window.DFLIP = window.DFLIP || {};
        window.DFLIP.defaults = {
            webgl: false,
            webglRetina: false,
            soundEnable: true,
            height: '100vh',
            hideControls: "download,print,more,share,fullscreen,toggle,play", 
            controlDuration: 0
        };

        if (fileUrl) {
            var option_flipbook_container = {
                source: decodeURIComponent(fileUrl),
                direction: 1
            };
        }
    </script>
    
    <link href="https://cdn.jsdelivr.net/npm/@dearhive/dearflip-jquery-flipbook@1.7.3/dflip/css/dflip.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@dearhive/dearflip-jquery-flipbook@1.7.3/dflip/css/themify-icons.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@dearhive/dearflip-jquery-flipbook@1.7.3/dflip/js/dflip.min.js"></script>
    
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #1e293b; }
        ._df_book { height: 100vh !important; width: 100% !important; margin: 0 !important; }
    </style>
</head>
<body>

    <div class="_df_book" id="flipbook_container"></div>

    <script>
        // Pengawas halaman terakhir internal iframe
        let kuisSudahDipicu = false;
        const cekHalaman = setInterval(() => {
            if (window.DFLIP && window.DFLIP.books && window.DFLIP.books.flipbook_container) {
                const book = window.DFLIP.books.flipbook_container;
                
                if (book.currentPage === book.totalPages && !kuisSudahDipicu) {
                    kuisSudahDipicu = true;
                    clearInterval(cekHalaman);
                    
                    // Kirim sinyal ke index.html (parent window) bahwa membaca sudah selesai
                    window.parent.postMessage({ status: 'SELESAI_MEMBACA' }, '*');
                }
            }
        }, 1000);
    </script>
</body>
</html>
